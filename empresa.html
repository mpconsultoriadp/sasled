<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS - Detalhes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff; color: #000; text-align: center; font-family: sans-serif; }
        /* Círculo da Logo com redimensionamento automático */
        .logo-circle { 
            width: 130px; height: 130px; background: #000; border: 4px solid #fff; 
            border-radius: 50%; margin: 40px auto 20px; display: flex; 
            justify-content: center; align-items: center; overflow: hidden; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .logo-circle img { max-width: 100%; max-height: 100%; object-fit: contain; }
        /* Botões vermelhos conforme seu padrão */
        .btn-vermelho { 
            background-color: #ff2415; color: white; border: none; border-radius: 10px; 
            padding: 14px; font-weight: bold; text-decoration: none; display: block; 
            margin: 12px auto; width: 85%; max-width: 400px;
        }
        .btn-site { background-color: #000; }
        .box-info { background: #f8f9fa; padding: 25px; border-radius: 15px; margin: 20px auto; width: 90%; max-width: 500px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="logo-circle"><img id="e-logo" src=""></div>
    <h2 id="e-nome" class="fw-bold"></h2>
    <p id="e-segmento" class="text-muted small mb-4"></p>

    <div class="container">
        <a id="l-wpp" href="#" class="btn-vermelho">WhatsApp</a>
        <a id="l-ig" href="#" class="btn-vermelho">Instagram</a>
        <a id="l-site" href="#" class="btn-vermelho btn-site">Visitar Website</a>
    </div>

    <div class="box-info">
        <h6 class="fw-bold text-primary mb-2">SOBRE A MARCA</h6>
        <p id="e-desc" class="text-secondary small mb-0"></p>
    </div>

    <script src="SAS/dados-empresas.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const info = dadosEmpresas[id];
        if(info) {
            document.getElementById('e-logo').src = info.logo;
            document.getElementById('e-nome').innerText = info.nome;
            document.getElementById('e-segmento').innerText = info.segmento;
            document.getElementById('e-desc').innerText = info.descricao;
            document.getElementById('l-wpp').href = info.whatsapp;
            document.getElementById('l-ig').href = info.instagram;
            document.getElementById('l-site').href = info.site || "#";
        }
    </script>
</body>
</html>
