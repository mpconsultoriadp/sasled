<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS - Painel de Expositores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .header-sas { background: linear-gradient(to bottom, #0047AB, #000); padding: 30px; text-align: center; border-bottom: 2px solid #0047AB; }
        .card-empresa { background: #111; border: 1px solid #333; border-radius: 12px; text-decoration: none; color: white; display: block; transition: 0.3s; height: 100%; }
        .card-empresa:hover { border-color: #0047AB; transform: translateY(-5px); }
        .img-box { height: 110px; display: flex; align-items: center; justify-content: center; padding: 12px; background: #fff; border-radius: 12px 12px 0 0; }
        .img-box img { max-height: 80px; max-width: 100%; object-fit: contain; }
        .nome-box { padding: 12px; text-align: center; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="header-sas">
        <h2 class="fw-bold text-uppercase">Expositores SAS</h2>
        <p class="text-info small">Toque na marca para ver contatos</p>
    </div>
    <div class="container py-4">
        <div class="row g-3" id="grade-empresas"></div>
    </div>

    <script src="dados-empresas.js"></script>
    <script>
        const grade = document.getElementById('grade-empresas');
        if (typeof dadosEmpresas !== 'undefined') {
            Object.keys(dadosEmpresas).forEach(id => {
                const empresa = dadosEmpresas[id];
                grade.innerHTML += `
                    <div class="col-6 col-md-4 col-lg-3">
                        <a href="empresa.html?id=${id}" class="card-empresa shadow">
                            <div class="img-box"><img src="${empresa.logo}" alt="${empresa.nome}"></div>
                            <div class="nome-box">${empresa.nome.toUpperCase()}</div>
                        </a>
                    </div>`;
            });
        }
    </script>
</body>
</html>
